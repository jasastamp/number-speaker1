<!DOCTYPE html>
<html>
<head>
    <title>Have a Nice Day</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #numberBox {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            font-size: 80px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            color: white;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
        }
    </style>
</head>
<body>
<label>Min: <input type="number" id="minValue" value="1"></label>
<label>Max: <input type="number" id="maxValue" value="10"></label>
<h1>Have a Nice Day</h1>

<div id="numberBox">–</div>

<button onclick="startSpeaking()">Start</button>
<button onclick="stopSpeaking()">Stop</button>

<script>
    let interval = null;

    const colours = {
	0: "grey",
        1: "red",
        2: "orange",
        3: "gold",
        4: "green",
        5: "blue",
        6: "indigo",
        7: "violet",
        8: "brown",
        9: "black"
    };

    function speak(text) {
    	const msg = new SpeechSynthesisUtterance(text);
    	speechSynthesis.speak(msg);
    	// speechSynthesis.cancel();  //cancels speech queue - not needed as long as voice is fast enough
    	// const msg = new SpeechSynthesisUtterance(text);
    	// speechSynthesis.speak(msg);
    }


let speaking = false;

function startSpeaking() {
    if (interval) return;

    interval = setInterval(() => {
        if (speaking) return; // wait until speech finishes

        const min = parseInt(document.getElementById("minValue").value);
	const max = parseInt(document.getElementById("maxValue").value);

	const num = Math.floor(Math.random() * (max - min + 1)) + min;

        const box = document.getElementById("numberBox");
        box.textContent = num;
	const lastDigit = Math.abs(num) % 10;
        box.style.backgroundColor = colours[lastDigit];

        const msg = new SpeechSynthesisUtterance(num);


	


	msg.rate = 2;   // CHANGE THIS NUMBER TO CONTROL SPEED
        msg.pitch = 1;    // optional
        msg.volume = 1;   // optional

        speaking = true;

        msg.onend = () => {
            speaking = false;
        };

        speechSynthesis.speak(msg);

    }, 1000); //ie 1000 msec every number
}

    function stopSpeaking() {
        clearInterval(interval);
        interval = null;
    }
</script>

</body>
</html>
